<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Jogos Internos IFAL</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">JOGOS <span>IFAL</span></div>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="programacao.html">Programação</a></li>
                <li><a href="modalidades.html">Modalidades</a></li>
                <li><a href="equipes.html">Equipes</a></li>
                <li><a href="galeria.html">Galeria</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="historico.html">Histórico</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="hero">
            <div class="hero-content">
                <h1>Contato</h1>
                <p>Envie sua dúvida, sugestão ou mensagem para a organização.</p>
            </div>
        </section>

        <section class="container">

            <div class="card">

                <form class="contato-form">

                    <div class="form-row">

                        <div class="form-group">
                            <label for="nome">Nome</label>

                            <input type="text" id="nome" placeholder="Digite seu nome">
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>

                            <input type="email" id="email" placeholder="Digite seu e-mail">
                        </div>

                    </div>

                    <div class="form-group">
                        <label for="turma">Turma</label>

                        <input type="text" id="turma" placeholder="Digite sua turma">
                    </div>

                    <div class="form-group">
                        <label for="mensagem">Mensagem</label>

                        <textarea id="mensagem" rows="6" placeholder="Digite sua mensagem"></textarea>
                    </div>

                    <button type="submit" class="btn-enviar">
                        Enviar Mensagem
                    </button>

                </form>

            </div>

        </section>

    </main>

    <footer>
        <div class="footer-content container">
            <p><strong>Instituto Federal de Alagoas - IFAL</strong></p>
            <p>&copy; Murilo, Clara, Beatriz, Jamylle</p>
            <p><time datetime="2026-05-08">8 de maio de 2026</time></p>
        </div>
    </footer>

</body>
</html>
